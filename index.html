<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>666RREY</title>
    <meta
      name="description"
      content="Чёрно-белый emo/goth лэндинг: SoundCloud профиль и Telegram бот."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Roboto+Mono:wght@400;500;700&family=UnifrakturCook:wght@700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="viz" aria-hidden="true"></canvas>
    <div class="overlay" aria-hidden="true"></div>

    <main class="wrap">
      <section class="hero">
        <div
          class="avatar-cross"
          role="button"
          tabindex="0"
          aria-label="Череп смеется при нажатии"
        >
          <img class="avatar-cross__img" src="./image.jpg" alt="" />
        </div>
        <h1 class="title">
          <span class="glitch" data-text="666RREY">666RREY</span>
        </h1>

        <div class="cards" role="navigation" aria-label="Ссылки">
          <a
            class="card"
            href="https://on.soundcloud.com/XiIaAVAXTqiQHGAL3M"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="card__label">SoundCloud</span>
            <span class="card__hint">профиль</span>
          </a>

          <a
            class="card"
            href="https://t.me/SC_666rrey_bot"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="card__label">Telegram бот</span>
            <span class="card__hint">предложить трек</span>
          </a>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
